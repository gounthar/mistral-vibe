name: Build and upload

on:
  release:
    types: [published]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  configure:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      smoke_matrix: ${{ steps.set-matrix.outputs.smoke_matrix }}
    steps:
      - name: Set matrix
        id: set-matrix
        run: |
          # Linux: manylinux_2_28 containers → binary works on glibc >= 2.28 (RHEL 8+, Ubuntu 20.04+)
          # Container images pinned by digest (supply-chain integrity)
          matrix='{
            "include": [
              {"runner": "ubuntu-22.04", "os": "linux", "arch": "x86_64", "container": "quay.io/pypa/manylinux_2_28_x86_64@sha256:65140ef21cef92d0c13d001708afd7d304d7a154f7120d039df99dac708f3ffb"},
              {"runner": "ubuntu-22.04-arm", "os": "linux", "arch": "aarch64", "container": "quay.io/pypa/manylinux_2_28_aarch64@sha256:360bf4ec4349372e9bcfb123bf11bcc4f085072bfa4f3b946d98f5a28f9c03b0"},
              {"runner": "macos-15-intel", "os": "darwin", "arch": "x86_64"},
              {"runner": "macos-14", "os": "darwin", "arch": "aarch64"},
              {"runner": "windows-2022", "os": "windows", "arch": "x86_64"}
            ]
          }'
          # TODO: Re-enable macOS standalone artifact smoke tests once the PyInstaller
          # binaries are Developer ID signed and notarized. The direct GitHub zip
          # download path gets Gatekeeper-assessed via quarantine and currently rejects
          # ad-hoc signed binaries, even though vibe-acp continues to work when bundled
          # through the VS Code extension.
          # almalinux:8 pinned by digest in the matrix entry below (supply-chain integrity)
          smoke_matrix='{
            "include": [
              {"runner": "ubuntu-24.04", "os": "linux", "arch": "x86_64"},
              {"runner": "ubuntu-24.04", "os": "linux", "arch": "x86_64", "tag": "old-glibc", "container": "almalinux:8@sha256:4a87d2615a770506e204c27d6248ac97f4df67f4e41e2e9c47c81f0ed0be98cb"},
              {"runner": "ubuntu-24.04-arm", "os": "linux", "arch": "aarch64"},
              {"runner": "windows-latest", "os": "windows", "arch": "x86_64"}
            ]
          }'
          echo "matrix=$(echo $matrix | jq -c .)" >> $GITHUB_OUTPUT
          echo "smoke_matrix=$(echo $smoke_matrix | jq -c .)" >> $GITHUB_OUTPUT

  build-and-upload:
    needs: configure
    name: "Build and upload: ${{ matrix.os }}-${{ matrix.arch }}"
    permissions:
      contents: read
    strategy:
      matrix: ${{ fromJSON(needs.configure.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv with caching
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        if: ${{ matrix.os != 'linux' }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install Python (Linux)
        if: ${{ matrix.os == 'linux' }}
        shell: bash
        run: bash ./scripts/ci/setup-linux-pyinstaller-build.sh

      - name: Inject Sentry DSN
        shell: bash
        env:
          CLI_SENTRY_DSN: ${{ secrets.CLI_SENTRY_DSN }}
          ACP_SENTRY_DSN: ${{ secrets.ACP_SENTRY_DSN }}
          REQUIRE_SENTRY_DSN: ${{ github.event_name == 'release' && 'true' || 'false' }}
        run: bash ./scripts/ci/inject-sentry-dsn.sh

      - name: Build PyInstaller binaries
        shell: bash
        run: bash ./scripts/ci/build-pyinstaller-binaries.sh vibe-acp.spec vibe.spec

      - name: Clear executable stack on bundled libraries
        if: ${{ matrix.os == 'linux' }}
        shell: bash
        run: bash ./scripts/ci/clear-linux-execstack.sh dist/vibe-acp-dir dist/vibe-dir

      - name: Get package version
        id: get_version
        shell: bash
        run: echo "version=$(uv version | cut -d' ' -f2)" >> $GITHUB_OUTPUT

      - name: Package PyInstaller artifacts
        shell: bash
        run: bash ./scripts/ci/package-pyinstaller-artifacts.sh ${{ matrix.os }} ${{ matrix.arch }} ${{ steps.get_version.outputs.version }} vibe-acp vibe

      - name: Upload ACP release asset
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: dist/release-assets/vibe-acp-${{ matrix.os }}-${{ matrix.arch }}-${{ steps.get_version.outputs.version }}.zip
          archive: false

      - name: Upload CLI release asset
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: dist/release-assets/vibe-${{ matrix.os }}-${{ matrix.arch }}-${{ steps.get_version.outputs.version }}.zip
          archive: false

  build-riscv64:
    name: linux-riscv64
    runs-on: [self-hosted, linux, riscv64]
    timeout-minutes: 45
    if: >-
      github.repository == 'mistralai/mistral-vibe' &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - name: Build vibe-acp for riscv64
        run: bash scripts/build-riscv64.sh

      - name: Get package version
        id: get_version
        run: |
          source .venv-riscv64/bin/activate
          VERSION="$(python -c 'from vibe import __version__; print(__version__)')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          deactivate

      - name: Upload binary artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: vibe-acp-linux-riscv64-${{ steps.get_version.outputs.version }}
          path: dist/vibe-acp

  nix-build:
    needs: configure
    name: "Nix build and upload: ${{ matrix.os }}-${{ matrix.arch }}"
    permissions:
      contents: read
    strategy:
      matrix: ${{ fromJSON(needs.configure.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        if: matrix.os != 'windows'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Nix
        if: matrix.os != 'windows'
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6

      - name: Build with Nix
        if: matrix.os != 'windows'
        shell: bash
        run: |
          nix build .#

      - name: Nix Smoke Test
        if: matrix.os != 'windows'
        shell: bash
        run: |
          nix run .# -- --version

  smoke-test:
    needs: [configure, build-and-upload]
    name: "Test: ${{ matrix.os }}-${{ matrix.arch }}${{ matrix.tag && format('-{0}', matrix.tag) || '' }}"
    permissions:
      contents: read
    strategy:
      matrix: ${{ fromJSON(needs.configure.outputs.smoke_matrix) }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        if: ${{ !matrix.container }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Set up Python (container)
        if: ${{ matrix.container }}
        run: yum install -y python3.11 python3.11-pip unzip

      - name: Install smoke test deps
        run: ${{ matrix.container && 'python3.11' || 'python' }} -m pip install agent-client-protocol==0.11.0

      - name: Download ACP artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: vibe-acp-${{ matrix.os }}-${{ matrix.arch }}-*.zip
          merge-multiple: true
          skip-decompress: true
          path: artifacts/vibe-acp

      - name: Download CLI artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: vibe-${{ matrix.os }}-${{ matrix.arch }}-*.zip
          merge-multiple: true
          skip-decompress: true
          path: artifacts/vibe

      - name: Extract release assets
        shell: bash
        run: |
          shopt -s nullglob
          mkdir -p dist/vibe-acp-dir dist/vibe-dir

          extract_asset() {
            local artifact_dir="$1"
            local output_dir="$2"
            local zips=("$artifact_dir"/*.zip)

            if [ "${#zips[@]}" -ne 1 ]; then
              echo "Expected one zip in $artifact_dir, found ${#zips[@]}" >&2
              exit 1
            fi

            if [ "${{ matrix.os }}" = "windows" ]; then
              powershell -NoProfile -Command "Expand-Archive -Path '${zips[0]}' -DestinationPath '$output_dir' -Force"
              return
            fi

            unzip -oq "${zips[0]}" -d "$output_dir"
          }

          extract_asset artifacts/vibe-acp dist/vibe-acp-dir
          extract_asset artifacts/vibe dist/vibe-dir

      - name: Run ACP smoke tests
        run: ${{ matrix.container && 'python3.11' || 'python' }} tests/acp/smoke_binary.py dist/vibe-acp-dir

      - name: Run CLI smoke tests
        shell: bash
        env:
          PYTHON_BIN: ${{ matrix.container && 'python3.11' || 'python' }}
        run: bash ./scripts/ci/smoke-pyinstaller-cli.sh dist/vibe-dir

  attach-to-release:
    needs: [build-and-upload, smoke-test, build-riscv64]
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'release' &&
      always() &&
      needs.build-and-upload.result == 'success' &&
      needs.smoke-test.result == 'success' &&
      needs.build-riscv64.result != 'failure'
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          skip-decompress: true
          path: artifacts

      - name: Collect release assets
        shell: bash
        run: |
          mkdir release-assets
          find artifacts -name '*.zip' -exec cp {} release-assets/ \;
          test "$(find release-assets -name '*.zip' | wc -l)" -gt 0

      - name: Attach binaries to release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: release-assets/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
